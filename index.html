<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0b0710">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Treinão da Quésia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
:root {
  --bg-deep: #0b0710;
  --bg-surface: #161020;
  --bg-card: #1a1024;
  --gold: #d4af37;
  --gold-bright: #e8cd7a;
  --gold-deep: #c9a227;
  --gold-soft: rgba(212, 175, 55, 0.15);
  --gold-line: rgba(212, 175, 55, 0.35);
  --purple: #9d7bd8;
  --purple-soft: rgba(157, 123, 216, 0.12);
  --purple-line: rgba(157, 123, 216, 0.2);
  --text-primary: #f5f0e8;
  --text-muted: #8a7aa3;
  --danger: #c0392b;
  --danger-soft: rgba(192, 57, 43, 0.1);
  --radius-lg: 16px;
  --radius-md: 12px;
  --radius-sm: 8px;
  --font-display: 'Cormorant Garamond', serif;
  --font-body: 'Inter', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  padding: 16px;
  padding-bottom: 24px;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse 90% 55% at 50% -10%, rgba(157,123,216,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 60% 45% at 88% 105%, rgba(212,175,55,0.05) 0%, transparent 55%);
  pointer-events: none;
  z-index: 0;
}

body > * { position: relative; z-index: 1; }

/* === CELEBRATION OVERLAY === */
.celebration-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  z-index: 9999; pointer-events: none;
  background: rgba(11, 7, 16, 0.55);
  display: flex; align-items: center; justify-content: center;
  animation: celebFade 3s ease forwards;
}
@keyframes celebFade { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }
.celebration-text {
  font-family: var(--font-display); font-style: italic;
  font-size: 36px; font-weight: 600;
  color: var(--gold-bright); text-align: center;
  text-shadow: 0 2px 24px rgba(212, 175, 55, 0.45);
  letter-spacing: 1px;
  animation: celebPulse 0.7s ease-in-out infinite alternate;
}
@keyframes celebPulse { 0% { transform: scale(1); } 100% { transform: scale(1.05); } }
.celebration-particle {
  position: fixed; top: -20px;
  pointer-events: none; z-index: 10000;
  animation: particleFall linear forwards;
}
.celebration-particle.diamond {
  background: var(--gold);
  box-shadow: 0 0 8px rgba(212, 175, 55, 0.6);
}
.celebration-particle.dot {
  background: var(--purple);
  border-radius: 50%;
}
@keyframes particleFall {
  0% { transform: translateY(0) rotate(45deg); opacity: 1; }
  80% { opacity: 1; }
  100% { transform: translateY(110vh) rotate(405deg); opacity: 0; }
}

/* === SCREENS === */
.screen { display: none; max-width: 500px; margin: 0 auto; animation: fadeIn 0.3s ease; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* === BUTTONS === */
.btn {
  display: block; width: 100%; padding: 15px 24px; border: none;
  border-radius: var(--radius-md); font-size: 13px; font-weight: 600;
  font-family: var(--font-body); cursor: pointer; transition: all 0.3s ease;
  margin-bottom: 12px;
}
.btn-primary {
  background: linear-gradient(135deg, var(--gold-bright), var(--gold-deep));
  color: var(--bg-deep); font-weight: 700; text-transform: uppercase; letter-spacing: 2.5px;
  font-size: 12px;
  box-shadow: 0 4px 18px rgba(212, 175, 55, 0.25);
}
.btn-primary:hover { box-shadow: 0 4px 26px rgba(212, 175, 55, 0.4); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.btn-secondary {
  background: var(--bg-surface); color: var(--text-primary);
  border: 1px solid var(--purple-line);
}
.btn-danger {
  background: var(--danger-soft);
  border: 1px solid rgba(192, 57, 43, 0.4);
  color: #d9695c;
}
.btn-small { padding: 10px 16px; font-size: 13px; width: auto; display: inline-block; margin-bottom: 0; }

/* === HOME === */
.home-header {
  text-align: center; margin-bottom: 26px; padding-top: 14px;
  position: relative;
}
.home-header h1 {
  font-family: var(--font-display); font-size: 32px; font-weight: 600;
  letter-spacing: 1px;
  background: linear-gradient(120deg, var(--gold-bright) 0%, var(--gold-deep) 50%, var(--gold-bright) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.home-header .subtitle {
  color: var(--text-muted); font-size: 13px; margin-top: 2px;
  font-family: var(--font-display); font-style: italic; font-weight: 500;
  letter-spacing: 0.5px;
}
.home-divider {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  margin-top: 12px;
}
.home-divider::before, .home-divider::after {
  content: ''; height: 1px; width: 72px;
  background: linear-gradient(90deg, transparent, var(--gold-line));
}
.home-divider::after {
  background: linear-gradient(90deg, var(--gold-line), transparent);
}
.home-divider span {
  color: var(--gold); font-size: 8px; line-height: 1;
}

/* === SETTINGS GEAR === */
.settings-gear {
  position: absolute; top: 12px; right: 0;
  width: 36px; height: 36px; border: 1px solid var(--purple-line); background: transparent;
  border-radius: 50%; cursor: pointer; display: flex; align-items: center;
  justify-content: center; transition: all 0.2s;
}
.settings-gear:hover { background: var(--purple-soft); }
.settings-gear svg { width: 17px; height: 17px; color: var(--text-muted); }

/* === TAB BAR === */
.tab-bar {
  display: flex; gap: 4px; padding: 4px; margin-bottom: 20px;
  background: var(--bg-surface); border: 1px solid var(--purple-line);
  border-radius: var(--radius-md);
}
.tab-btn {
  flex: 1; padding: 10px 8px; border: 1px solid transparent; background: transparent;
  color: var(--text-muted); font-family: var(--font-body); font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.5px; border-radius: var(--radius-sm);
  cursor: pointer; transition: all 0.25s;
  -webkit-tap-highlight-color: transparent;
}
.tab-btn.active {
  background: var(--gold-soft); color: var(--gold); border-color: var(--gold-line);
}

/* === TRAINING PICK CARDS === */
.training-cards { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }

.training-pick-card {
  background: var(--bg-card); border-radius: var(--radius-lg);
  padding: 16px 18px; display: flex; align-items: center; gap: 14px;
  border: 1px solid var(--purple-line);
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
  cursor: pointer; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.training-pick-card:active { transform: scale(0.98); }
.training-pick-card.last-done {
  border-color: var(--gold-line);
  box-shadow: 0 4px 20px rgba(212, 175, 55, 0.08);
}

.training-pick-icon {
  flex-shrink: 0; color: var(--gold);
  width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
  background: var(--gold-soft); border: 1px solid var(--gold-line);
  border-radius: var(--radius-md);
}
.training-pick-icon svg { width: 26px; height: 26px; }

.training-pick-info { flex: 1; min-width: 0; }
.training-pick-name {
  font-size: 19px; font-weight: 600; font-family: var(--font-display);
  color: var(--text-primary); letter-spacing: 0.3px;
}
.training-pick-stats {
  font-size: 12px; color: var(--text-muted); margin-top: 3px;
  display: flex; gap: 10px; align-items: center;
}
.training-pick-stats .count { color: var(--purple); font-weight: 600; }
.training-pick-stats .last-date { color: var(--text-muted); }

.training-pick-arrow {
  font-size: 18px; color: var(--gold); flex-shrink: 0;
  opacity: 0.45;
}

.last-badge {
  font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
  background: var(--gold-soft); color: var(--gold);
  border: 1px solid var(--gold-line);
  text-transform: uppercase; letter-spacing: 0.5px;
}

/* === STAT CARD ULTIMO TREINO === */
.stat-card.clickable { cursor: pointer; -webkit-tap-highlight-color: transparent; transition: all 0.2s; position: relative; }
.stat-card.clickable:active { transform: scale(0.97); }
.stat-card.clickable::after {
  content: '▾'; position: absolute; bottom: 6px; right: 10px;
  font-size: 10px; color: var(--text-muted); opacity: 0.5; transition: transform 0.3s;
}
.stat-card.clickable.expanded::after { transform: rotate(180deg); }
.stat-sublabel { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.stat-value.workout-name {
  font-size: 19px; line-height: 1.2; font-family: var(--font-display);
  font-weight: 600; color: var(--text-primary);
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.stat-value .stat-icon { color: var(--gold); display: inline-flex; }
.stat-value .stat-icon svg { width: 18px; height: 18px; }

/* === HISTORY EXPAND (below stats) === */
.history-expand {
  max-height: 0; overflow: hidden; opacity: 0;
  transition: max-height 0.4s ease, opacity 0.3s ease, margin 0.3s ease;
  margin-bottom: 0;
}
.history-expand.open {
  max-height: 600px; opacity: 1; margin-bottom: 20px;
}
.history-expand-entry {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; margin-bottom: 6px;
  background: var(--bg-surface); border-radius: var(--radius-md);
  border: 1px solid var(--purple-line);
  cursor: pointer; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.history-expand-entry:active { transform: scale(0.98); }
.history-expand-entry-icon { flex-shrink: 0; color: var(--gold); display: flex; }
.history-expand-entry-icon svg { width: 20px; height: 20px; }
.history-expand-entry-info { flex: 1; min-width: 0; }
.history-expand-entry-name {
  font-size: 15px; font-weight: 600; font-family: var(--font-display);
  color: var(--text-primary);
}
.history-expand-entry-meta {
  font-size: 11px; color: var(--text-muted); margin-top: 2px;
  display: flex; gap: 8px;
}
.history-expand-entry-meta .dur { color: var(--purple); font-weight: 600; }
.history-expand-entry-meta .sets { color: var(--gold); font-weight: 600; }
.history-expand-entry-detail {
  max-height: 0; overflow: hidden; opacity: 0;
  transition: max-height 0.3s ease, opacity 0.25s ease, padding 0.3s ease;
  padding: 0 14px;
  background: rgba(11, 7, 16, 0.5); border-radius: 0 0 var(--radius-md) var(--radius-md);
  margin-top: -6px; margin-bottom: 6px;
}
.history-expand-entry-detail.open {
  max-height: 300px; opacity: 1; padding: 8px 14px 10px;
  border: 1px solid var(--purple-line); border-top: none;
}
.history-expand-time { padding: 4px 0 6px; font-size: 11px; color: var(--purple); font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 4px; }
.history-expand-exercise { padding: 3px 0; font-size: 11px; color: var(--text-muted); }
.history-expand-exercise span { color: var(--gold); font-weight: 600; }
.history-expand-cardio { color: var(--purple); font-weight: 600; }
.history-delete-btn {
  background: none; border: none; color: var(--text-muted);
  padding: 6px 8px; cursor: pointer; opacity: 0.5; transition: opacity 0.2s, color 0.2s;
  -webkit-tap-highlight-color: transparent; flex-shrink: 0; display: flex;
}
.history-delete-btn svg { width: 15px; height: 15px; }
.history-delete-btn:hover, .history-delete-btn:active { opacity: 1; color: #d9695c; }
.history-expand-empty {
  text-align: center; padding: 16px; font-size: 14px; color: var(--text-muted);
  font-family: var(--font-display); font-style: italic;
}

/* === CARDIO CARD (HOME) === */
.cardio-card {
  background: var(--bg-surface); border-radius: var(--radius-lg);
  padding: 14px 16px; margin-bottom: 16px;
  border: 1px solid var(--purple-line);
}
.cardio-card-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
}
.cardio-card-title {
  font-family: var(--font-display); font-size: 17px; font-weight: 600; color: var(--text-primary);
  display: flex; align-items: center; gap: 7px;
}
.cardio-card-title svg { width: 16px; height: 16px; color: var(--gold); }
.cardio-card-values {
  font-size: 12px; color: var(--text-muted); font-weight: 600;
}
.cardio-card-values strong { color: var(--gold); font-size: 14px; font-variant-numeric: tabular-nums; }
.cardio-bar {
  height: 8px; background: rgba(11, 7, 16, 0.8); border-radius: 4px; overflow: hidden;
  border: 1px solid var(--purple-line);
}
.cardio-bar-fill {
  height: 100%; border-radius: 4px; transition: width 0.4s ease;
  background: linear-gradient(90deg, var(--purple), var(--gold));
}
.cardio-bar-fill.complete {
  background: linear-gradient(90deg, var(--gold-deep), var(--gold-bright));
}
.cardio-card-footer {
  display: flex; align-items: center; justify-content: space-between; margin-top: 8px;
}
.cardio-percent { font-size: 11px; font-weight: 700; color: var(--purple); font-variant-numeric: tabular-nums; }
.cardio-percent.complete { color: var(--gold); }
.cardio-footer-actions { display: flex; gap: 6px; }
.cardio-reset-btn {
  background: none; border: 1px solid var(--purple-line); border-radius: var(--radius-sm);
  color: var(--text-muted); font-size: 11px; padding: 4px 10px; cursor: pointer;
  font-family: var(--font-body); font-weight: 600; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.cardio-reset-btn:active { background: var(--purple-soft); transform: scale(0.95); }
.cardio-add-btn {
  background: var(--gold-soft); border: 1px solid var(--gold-line); border-radius: var(--radius-sm);
  color: var(--gold); font-size: 11px; padding: 4px 10px; cursor: pointer;
  font-family: var(--font-body); font-weight: 700; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.cardio-add-btn:active { transform: scale(0.95); }
.cardio-add-section {
  max-height: 0; overflow: hidden; opacity: 0;
  transition: max-height 0.35s ease, opacity 0.25s ease, margin 0.3s ease;
  margin-top: 0;
}
.cardio-add-section.open { max-height: 160px; opacity: 1; margin-top: 12px; }
.cardio-confirm-btn {
  margin-left: auto; padding: 8px 16px; border: none; border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--gold-bright), var(--gold-deep));
  color: var(--bg-deep); font-size: 12px; font-weight: 700; font-family: var(--font-body);
  text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.cardio-confirm-btn:active { transform: scale(0.95); }

/* === CARDIO INPUT (WORKOUT) === */
.cardio-input-section {
  background: var(--bg-surface); border-radius: var(--radius-lg);
  padding: 14px 16px; margin-bottom: 12px;
  border: 1px solid var(--purple-line);
}
.cardio-input-label {
  font-family: var(--font-display); font-size: 17px; font-weight: 600;
  color: var(--text-primary); margin-bottom: 10px;
  display: flex; align-items: center; gap: 7px;
}
.cardio-input-label svg { width: 16px; height: 16px; color: var(--gold); }
.cardio-quick-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.cardio-quick-btn {
  padding: 8px 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--purple-line); background: rgba(11, 7, 16, 0.6);
  color: var(--text-muted); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; font-family: var(--font-body);
  font-variant-numeric: tabular-nums;
  -webkit-tap-highlight-color: transparent;
}
.cardio-quick-btn:active { transform: scale(0.95); }
.cardio-quick-btn.selected {
  background: linear-gradient(135deg, var(--gold-bright), var(--gold-deep));
  color: var(--bg-deep); border-color: transparent; font-weight: 700;
  box-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
}
.cardio-custom-row {
  display: flex; align-items: center; gap: 8px;
}
.cardio-custom-input {
  width: 60px; padding: 8px 4px; background: rgba(11, 7, 16, 0.8);
  border-radius: var(--radius-sm); border: 1px solid var(--purple-line);
  color: var(--text-primary); font-size: 16px; font-weight: 700;
  font-family: var(--font-body); font-variant-numeric: tabular-nums; text-align: center;
}
.cardio-custom-input:focus { outline: none; border-color: var(--gold); }
.cardio-custom-label { font-size: 12px; color: var(--text-muted); font-weight: 600; }

/* === STATS ROW === */
.stats-row { display: flex; gap: 12px; margin-bottom: 20px; }
.stat-card {
  flex: 1; background: var(--bg-surface); border-radius: var(--radius-md);
  padding: 16px; text-align: center; border: 1px solid var(--purple-line);
}
.stat-value {
  font-size: 28px; font-weight: 700; font-family: var(--font-body);
  font-variant-numeric: tabular-nums; color: var(--gold);
}
.stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 5px; }

/* === WORKOUT === */
.workout-title {
  font-family: var(--font-display); font-size: 24px; font-weight: 600;
  text-align: center; margin-bottom: 16px; color: var(--gold-bright);
  display: flex; align-items: center; justify-content: center; gap: 9px;
  letter-spacing: 0.5px;
}
.workout-title svg { width: 22px; height: 22px; color: var(--gold); }

.warmup-section {
  background: var(--bg-surface); border-radius: var(--radius-lg);
  margin-bottom: 16px; overflow: hidden;
  border: 1px solid var(--purple-line);
}
.warmup-header {
  padding: 14px 18px; cursor: pointer; display: flex; align-items: center;
  justify-content: space-between; font-weight: 600; font-size: 16px;
  font-family: var(--font-display);
}
.warmup-header .arrow { transition: transform 0.3s; font-size: 11px; color: var(--gold); }
.warmup-header.open .arrow { transform: rotate(180deg); }
.warmup-body { padding: 0 18px 14px; display: none; }
.warmup-body.open { display: block; }
.warmup-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 0;
  border-bottom: 1px solid rgba(157, 123, 216, 0.1); font-size: 14px;
}
.warmup-item:last-child { border-bottom: none; }
.warmup-check {
  width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid var(--purple);
  background: transparent; cursor: pointer; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; transition: all 0.2s;
}
.warmup-check.done { background: var(--gold); border-color: var(--gold); }
.warmup-check.done::after { content: '\2713'; color: var(--bg-deep); font-size: 13px; font-weight: 700; }

.warmup-item-text { flex: 1; min-width: 0; }
.warmup-duration { color: var(--purple); font-size: 12px; font-variant-numeric: tabular-nums; }

.warmup-timer-btn {
  width: 32px; height: 32px; border: 1px solid var(--purple-line);
  border-radius: var(--radius-sm); background: var(--purple-soft);
  cursor: pointer; color: var(--gold); display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.warmup-timer-btn svg { width: 16px; height: 16px; }
.warmup-timer-btn:active { background: var(--purple-line); transform: scale(0.92); }

/* === EXERCISE CARDS === */
.exercise-card {
  background: var(--bg-card); border-radius: var(--radius-lg);
  padding: 14px 16px; margin-bottom: 12px;
  border: 1px solid var(--purple-line);
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
}
.exercise-card.pr-matched {
  border-color: var(--gold-line);
  box-shadow: 0 4px 20px rgba(212, 175, 55, 0.12);
}
.exercise-header {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 8px;
}
.exercise-name { font-size: 18px; font-weight: 600; font-family: var(--font-display); }
.technique-badge {
  font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: 20px;
  text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
}
.technique-badge.rest-pause { background: var(--gold-soft); color: var(--gold); border: 1px solid var(--gold-line); }
.technique-badge.isometria { background: var(--purple-soft); color: var(--purple); border: 1px solid var(--purple-line); }
.technique-badge.pico { background: var(--gold-soft); color: var(--gold-bright); border: 1px solid var(--gold-line); }

.exercise-weight-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px; gap: 8px; flex-wrap: wrap;
}
.exercise-pr { font-size: 11px; color: var(--gold); font-weight: 600; font-variant-numeric: tabular-nums; }

// ========== STORAGE ==========

const Storage = {
  KEYS: {
    CONFIG: 'wq_config',
    HISTORY: 'wq_history',
    FLEX_HISTORY: 'wq_flex_history',
    IN_PROGRESS: 'wq_in_progress',
    ACTIVE_SCREEN: 'wq_active_screen',
    ACTIVE_TAB: 'wq_active_tab',
    WEIGHTS: 'wq_weights',
    WEIGHT_HISTORY: 'wq_weight_history',
    CARDIO: 'wq_cardio'
  },

  defaultConfig: { totalCompleted: 0, flexCompleted: 0 },

  getConfig() {
    const d = localStorage.getItem(this.KEYS.CONFIG);
    // Merge com defaults: configs antigos não têm flexCompleted (evita NaN)
    return d ? { ...this.defaultConfig, ...JSON.parse(d) } : { ...this.defaultConfig };
  },
  saveConfig(c) { localStorage.setItem(this.KEYS.CONFIG, JSON.stringify(c)); },

  getHistory() {
    const d = localStorage.getItem(this.KEYS.HISTORY);
    return d ? JSON.parse(d) : [];
  },
  saveHistory(h) { localStorage.setItem(this.KEYS.HISTORY, JSON.stringify(h)); },
  addToHistory(w) { const h = this.getHistory(); h.unshift(w); this.saveHistory(h); },
  removeFromHistory(index) {
    const h = this.getHistory();
    if (index >= 0 && index < h.length) { h.splice(index, 1); this.saveHistory(h); }
  },

  getFlexHistory() {
    const d = localStorage.getItem(this.KEYS.FLEX_HISTORY);
    return d ? JSON.parse(d) : [];
  },
  saveFlexHistory(h) { localStorage.setItem(this.KEYS.FLEX_HISTORY, JSON.stringify(h)); },
  addToFlexHistory(w) { const h = this.getFlexHistory(); h.unshift(w); this.saveFlexHistory(h); },
  removeFromFlexHistory(index) {
    const h = this.getFlexHistory();
    if (index >= 0 && index < h.length) { h.splice(index, 1); this.saveFlexHistory(h); }
  },

  getActiveTab() { return localStorage.getItem(this.KEYS.ACTIVE_TAB) || 'gym'; },
  saveActiveTab(t) { localStorage.setItem(this.KEYS.ACTIVE_TAB, t); },

  getInProgress() {
    const d = localStorage.getItem(this.KEYS.IN_PROGRESS);
    return d ? JSON.parse(d) : null;
  },
  saveInProgress(w) { localStorage.setItem(this.KEYS.IN_PROGRESS, JSON.stringify(w)); },
  clearInProgress() { localStorage.removeItem(this.KEYS.IN_PROGRESS); },

  getActiveScreen() { return localStorage.getItem(this.KEYS.ACTIVE_SCREEN) || 'home'; },
  saveActiveScreen(s) { localStorage.setItem(this.KEYS.ACTIVE_SCREEN, s); },

  getWeights() {
    const d = localStorage.getItem(this.KEYS.WEIGHTS);
    return d ? JSON.parse(d) : {};
  },
  saveWeight(exercise, weight) {
    const w = this.getWeights();
    w[exercise] = weight;
    localStorage.setItem(this.KEYS.WEIGHTS, JSON.stringify(w));
  },

  getWeightHistory() {
    const d = localStorage.getItem(this.KEYS.WEIGHT_HISTORY);
    return d ? JSON.parse(d) : {};
  },
  addWeightEntry(exercise, weight, date) {
    if (!weight) return;
    const wh = this.getWeightHistory();
    if (!wh[exercise]) wh[exercise] = [];
    wh[exercise].push({ weight: parseFloat(weight), date });
    localStorage.setItem(this.KEYS.WEIGHT_HISTORY, JSON.stringify(wh));
  },
  getPR(exercise) {
    const wh = this.getWeightHistory();
    if (!wh[exercise] || wh[exercise].length === 0) return null;
    return Math.max(...wh[exercise].map(e => e.weight));
  },

  getCardio() {
    const d = localStorage.getItem(this.KEYS.CARDIO);
    return d ? JSON.parse(d) : { total: 0, entries: [] };
  },
  addCardioEntry(minutes, date) {
    const c = this.getCardio();
    c.total += minutes;
    c.entries.unshift({ date, minutes });
    localStorage.setItem(this.KEYS.CARDIO, JSON.stringify(c));
  },
  resetCardio() {
    localStorage.setItem(this.KEYS.CARDIO, JSON.stringify({ total: 0, entries: [] }));
  },

  migrateWeightHistory() {
    if (localStorage.getItem('wq_wh_migrated')) return;
    const history = this.getHistory();
    history.forEach(record => {
      record.exercises.forEach(ex => {
        if (ex.weight) {
          this.addWeightEntry(ex.name, ex.weight, record.date);
        }
      });
    });
    localStorage.setItem('wq_wh_migrated', '1');
  },

  migrateExerciseNames() {
    if (localStorage.getItem('wq_names_v2')) return;

    const NAME_MAP = {
      'Terra': 'Terra no Smith',
      'Extensora': 'Cadeira extensora',
      'Leg Press 45': 'Leg 45',
      'Agachamento Sumo': 'Agachamento sumo',
      'Cadeira Flexora Unilateral': 'Cadeira flexora Unilateral',
      'Abdominal Supra Polia': 'Abdominal Supra na Polia',
      'Lombar no Banco Romano': 'Lombar no Banco romano',
      'Abdutora 45 graus': 'Abdutora 45',
      'Remada Curvada c/ Halteres': 'Remada Curvada com Halteres',
      'Remada Unilateral na Polia': 'Remada unilateral na polia',
      'Crucifixo Inverso c/ Halteres': 'Crucifixo inverso com halteres',
      'Triceps Unilateral na Polia': 'Triceps unilateral na polia',
      'Ponte Glutea': 'Ponte glutea',
      'Elevacao Pelvica c/ Mini Band': 'Elevação pélvica com mini band',
      'Extensao de Quadril na Polia': 'Extensão de quadril na Polia',
      'Cadeira Abdutora Tronco Inclinado c/ Band': 'Cadeira abdutora tronco inclinado',
      'Gluteo 4 Apoios na Polia': 'Gluteo 4 apoios na polia',
      'Cadeira Extensora Unilateral': 'Extensora unilateral',
      'Cadeira Extensora 45': 'Cadeira extensora 45',
      'Stiff Barra Livre Sumo': 'Stiff sumo'
    };

    // Migrar wq_weights
    const weights = this.getWeights();
    const newWeights = {};
    for (const [name, w] of Object.entries(weights)) {
      newWeights[NAME_MAP[name] || name] = w;
    }
    localStorage.setItem(this.KEYS.WEIGHTS, JSON.stringify(newWeights));

    // Migrar wq_weight_history
    const wh = this.getWeightHistory();
    const newWh = {};
    for (const [name, entries] of Object.entries(wh)) {
      newWh[NAME_MAP[name] || name] = entries;
    }
    localStorage.setItem(this.KEYS.WEIGHT_HISTORY, JSON.stringify(newWh));

    // Limpar treino em progresso (snapshot antigo)
    localStorage.removeItem(this.KEYS.IN_PROGRESS);

    localStorage.setItem('wq_names_v2', '1');
  },

  migrateExerciseNamesV3() {
    if (localStorage.getItem('wq_names_v3')) return;

    // Treino reformulado (Glúteo + Proteção de Joelho) — só equivalências óbvias
    const NAME_MAP = {
      'Leg 45': 'Leg press 45',
      'Abdominal Supra na Polia': 'Abdominal na polia',
      'Abdutora 45': 'Cadeira abdutora',
      'Remada Curvada com Halteres': 'Remada curvada halteres',
      'Remada baixa pegada neutra no pulley': 'Remada baixa pegada neutra (pulley)',
      'Crucifixo inverso com halteres': 'Crucifixo inverso',
      'Extensão de quadril na Polia': 'Coice na polia',
      'Gluteo 4 apoios na polia': 'Coice na polia',
      'RDL': 'Stiff'
    };

    // Merge (2 exercícios antigos podem apontar pro mesmo novo, ex.: Coice na polia)
    const weights = this.getWeights();
    const newWeights = {};
    for (const [name, w] of Object.entries(weights)) {
      const target = NAME_MAP[name] || name;
      newWeights[target] = Math.max(newWeights[target] || 0, parseFloat(w) || 0) || w;
    }
    localStorage.setItem(this.KEYS.WEIGHTS, JSON.stringify(newWeights));

    const wh = this.getWeightHistory();
    const newWh = {};
    for (const [name, entries] of Object.entries(wh)) {
      const target = NAME_MAP[name] || name;
      newWh[target] = (newWh[target] || []).concat(entries);
    }
    localStorage.setItem(this.KEYS.WEIGHT_HISTORY, JSON.stringify(newWh));

    // Limpar treino em progresso (snapshot do treino antigo, sem campo type)
    localStorage.removeItem(this.KEYS.IN_PROGRESS);

    localStorage.setItem('wq_names_v3', '1');
  },

  clearAll() {
    Object.values(this.KEYS).forEach(k => localStorage.removeItem(k));
    localStorage.removeItem('wq_wh_migrated');
    localStorage.removeItem('wq_names_v2');
    localStorage.removeItem('wq_names_v3');
  }
};

// ========== APP ==========

const App = {
  currentWorkout: null,
  timerInterval: null,
  timerSeconds: 0,
  timerTotalSeconds: 0,

  init() {
    Storage.migrateWeightHistory();
    Storage.migrateExerciseNames();
    Storage.migrateExerciseNamesV3();
    this.setupEventListeners();
    const saved = Storage.getInProgress();
    if (saved) {
      if (!saved.type) saved.type = 'gym';
      this.currentWorkout = saved;
      this.renderWorkoutScreen();
      this.restoreWorkoutState();
      this.showScreen('workout');
    } else {
      const last = Storage.getActiveScreen();
      if (last === 'settings') this.showScreen('settings');
      else { this.showScreen('home'); this.updateHomeScreen(); }
    }
  },

  showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    Storage.saveActiveScreen(id);
  },

  setupEventListeners() {
    document.getElementById('btn-finish-workout').addEventListener('click', () => this.finishWorkout());
    document.getElementById('btn-cancel-workout').addEventListener('click', () => this.cancelWorkout());
    document.getElementById('btn-rest-timer').addEventListener('click', () => this.startTimerFromButton());
    document.getElementById('btn-stop-timer').addEventListener('click', () => this.stopTimer());
    document.getElementById('btn-open-settings').addEventListener('click', () => this.showScreen('settings'));
    document.getElementById('btn-reset').addEventListener('click', () => {
      if (confirm('Resetar TODOS os dados? Esta acao nao pode ser desfeita.')) {
        Storage.clearAll();
        location.reload();
      }
    });
    document.getElementById('btn-back-settings').addEventListener('click', () => {
      this.showScreen('home'); this.updateHomeScreen();
    });

    // Tabs Academia / Flexibilidade
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        Storage.saveActiveTab(btn.dataset.tab);
        this.updateHomeScreen();
      });
    });

    // Cardio quick buttons
    document.querySelectorAll('.cardio-quick-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const wasSelected = btn.classList.contains('selected');
        document.querySelectorAll('.cardio-quick-btn').forEach(b => b.classList.remove('selected'));
        const input = document.getElementById('cardio-custom-input');
        if (wasSelected) {
          input.value = '';
        } else {
          btn.classList.add('selected');
          input.value = btn.dataset.min;
        }
      });
    });
    document.getElementById('cardio-custom-input').addEventListener('input', () => {
      document.querySelectorAll('.cardio-quick-btn').forEach(b => b.classList.remove('selected'));
    });
  },

  // ========== HOME ==========

  updateHomeScreen() {
    const config = Storage.getConfig();
    const tab = Storage.getActiveTab();
    const isFlex = tab === 'flex';
    const history = isFlex ? Storage.getFlexHistory() : Storage.getHistory();
    const sessions = isFlex ? FLEX_SESSIONS : TRAININGS;

    // Tab ativa
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));

    document.getElementById('stat-total').textContent = isFlex ? config.flexCompleted : config.totalCompleted;
    document.getElementById('stat-total-label').textContent = isFlex ? 'Sessões feitas' : 'Treinos feitos';
    document.getElementById('stat-streak-label').textContent = isFlex ? 'Última sessão' : 'Ultimo treino';

    // Cardio progress (meta independente — nas duas abas)
    this.renderCardioProgress();

    // Reset history expand state
    const histExpand = document.getElementById('history-expand');
    histExpand.classList.remove('open');

    // Última sessão (nome gravado no record — histórico antigo mantém o nome da época)
    const statStreak = document.getElementById('stat-streak');
    const statCard = statStreak.closest('.stat-card');
    statCard.classList.remove('expanded');
    if (history.length > 0) {
      const last = history[0];
      const tpl = sessions[last.trainingIndex];
      const lastName = last.name || (tpl ? tpl.name : '?');
      const lastIcon = tpl ? `<span class="stat-icon">${tpl.icon}</span>` : '';
      const d = new Date(last.date);
      const diff = Math.floor((Date.now() - d.getTime()) / 86400000);
      const dateLabel = diff === 0 ? 'Hoje' : diff === 1 ? 'Ontem' : `${diff}d atras`;
      statStreak.className = 'stat-value workout-name';
      statStreak.innerHTML = `${lastIcon}${lastName}`;
      // Add/update sublabel
      let sublabel = statCard.querySelector('.stat-sublabel');
      if (!sublabel) { sublabel = document.createElement('div'); sublabel.className = 'stat-sublabel'; statCard.appendChild(sublabel); }
      sublabel.textContent = dateLabel;
      // Make clickable
      statCard.classList.add('clickable');
      statCard.onclick = () => {
        const expand = document.getElementById('history-expand');
        expand.classList.toggle('open');
        statCard.classList.toggle('expanded');
      };
      // Render history panel
      this.renderHistoryExpand(history, isFlex);
    } else {
      statStreak.className = 'stat-value';
      statStreak.textContent = '-';
      statCard.classList.remove('clickable');
      statCard.onclick = null;
      const sublabel = statCard.querySelector('.stat-sublabel');
      if (sublabel) sublabel.remove();
      document.getElementById('history-expand').innerHTML = '';
    }

    // Compute per-training stats from history
    const trainingStats = sessions.map((_, i) => {
      const entries = history.filter(h => h.trainingIndex === i);
      return {
        count: entries.length,
        lastDate: entries.length > 0 ? entries[0].date : null
      };
    });

    // Find which training was done most recently
    let mostRecentIdx = -1;
    let mostRecentTime = 0;
    trainingStats.forEach((s, i) => {
      if (s.lastDate) {
        const t = new Date(s.lastDate).getTime();
        if (t > mostRecentTime) { mostRecentTime = t; mostRecentIdx = i; }
      }
    });

    // Render training cards da aba ativa
    const container = document.getElementById('training-cards');
    container.innerHTML = sessions.map((t, i) => {
      const stats = trainingStats[i];
      const isLast = i === mostRecentIdx;
      let lastStr = 'Nunca';
      if (stats.lastDate) {
        const d = new Date(stats.lastDate);
        const diff = Math.floor((Date.now() - d.getTime()) / 86400000);
        lastStr = diff === 0 ? 'Hoje' : diff === 1 ? 'Ontem' : `${diff}d atras`;
      }

      return `
        <div class="training-pick-card${isLast ? ' last-done' : ''}" data-training="${i}">
          <div class="training-pick-icon">${t.icon}</div>
          <div class="training-pick-info">
            <div class="training-pick-name">${t.name}</div>
            <div class="training-pick-stats">
              <span class="count">${stats.count}x feito</span>
              <span class="last-date">${lastStr}</span>
              ${isLast ? '<span class="last-badge">Ultimo</span>' : ''}
            </div>
          </div>
          <div class="training-pick-arrow">›</div>
        </div>`;
    }).join('');

    // Click anywhere on card starts workout
    container.querySelectorAll('.training-pick-card').forEach(card => {
      card.addEventListener('click', () => {
        this.startWorkout(tab, parseInt(card.dataset.training));
      });
    });

    // Sinais de parada (só na aba flex)
    const safety = document.getElementById('flex-safety');
    if (isFlex) {
      safety.innerHTML = `
        <div class="warmup-section">
          <div class="warmup-header" id="safety-toggle">
            <span>Sinais de parada</span>
            <span class="arrow">▼</span>
          </div>
          <div class="warmup-body" id="safety-body">
            <div class="safety-item">Dor profunda na virilha durante side split / straddle: parar imediatamente</div>
            <div class="safety-item">Dor anterior de joelho acima de 3/10, ou que persiste por mais de 24h</div>
            <div class="safety-item">Dor lombar que piora em extensão (cobra): interromper e avaliar</div>
            <div class="safety-item">Nada de balístico / balançar no fim de amplitude</div>
          </div>
        </div>`;
      document.getElementById('safety-toggle').addEventListener('click', () => {
        document.getElementById('safety-toggle').classList.toggle('open');
        document.getElementById('safety-body').classList.toggle('open');
      });
    } else {
      safety.innerHTML = '';
    }
  },

  // ========== CARDIO PROGRESS ==========

  renderCardioProgress() {
    const CARDIO_GOAL = 120; // minutos
    const cardio = Storage.getCardio();
    const pct = Math.min(Math.round((cardio.total / CARDIO_GOAL) * 100), 100);
    const isComplete = cardio.total >= CARDIO_GOAL;
    const h = Math.floor(cardio.total / 60);
    const m = cardio.total % 60;
    const totalStr = h > 0 ? `${h}h${m > 0 ? m + 'min' : ''}` : `${m}min`;

    const container = document.getElementById('cardio-progress');
    container.innerHTML = `
      <div class="cardio-card">
        <div class="cardio-card-header">
          <div class="cardio-card-title"><svg ${SVG_ATTRS}><path d="M3 12h4l2-5 4 10 2-5h6"/></svg> Cardio</div>
          <div class="cardio-card-values"><strong>${totalStr}</strong> / 2h</div>
        </div>
        <div class="cardio-bar">
          <div class="cardio-bar-fill${isComplete ? ' complete' : ''}" style="width: ${pct}%"></div>
        </div>
        <div class="cardio-card-footer">
          <span class="cardio-percent${isComplete ? ' complete' : ''}">${isComplete ? '&#9670; Completo' : pct + '%'}</span>
          <div class="cardio-footer-actions">
            <button class="cardio-add-btn" id="btn-cardio-add">+ Cardio</button>
            <button class="cardio-reset-btn" id="btn-cardio-reset">Reiniciar ciclo</button>
          </div>
        </div>
        <div class="cardio-add-section" id="cardio-add-section">
          <div class="cardio-quick-row">
            ${[10, 15, 20, 25, 30].map(min => `<button class="cardio-quick-btn home-cardio-quick" data-min="${min}">${min}min</button>`).join('')}
          </div>
          <div class="cardio-custom-row">
            <span class="cardio-custom-label">Outro:</span>
            <input type="number" class="cardio-custom-input" id="home-cardio-input" min="0" step="1" placeholder="—">
            <span class="cardio-custom-label">min</span>
            <button class="cardio-confirm-btn" id="btn-cardio-confirm">Registrar</button>
          </div>
        </div>
      </div>`;

    document.getElementById('btn-cardio-reset').addEventListener('click', () => {
      if (!confirm('Reiniciar o cardio? O acumulado volta a zero.')) return;
      Storage.resetCardio();
      this.renderCardioProgress();
    });

    // Registrar cardio avulso (sem treino)
    document.getElementById('btn-cardio-add').addEventListener('click', () => {
      document.getElementById('cardio-add-section').classList.toggle('open');
    });
    const homeInput = document.getElementById('home-cardio-input');
    container.querySelectorAll('.home-cardio-quick').forEach(btn => {
      btn.addEventListener('click', () => {
        const wasSelected = btn.classList.contains('selected');
        container.querySelectorAll('.home-cardio-quick').forEach(b => b.classList.remove('selected'));
        if (wasSelected) {
          homeInput.value = '';
        } else {
          btn.classList.add('selected');
          homeInput.value = btn.dataset.min;
        }
      });
    });
    homeInput.addEventListener('input', () => {
      container.querySelectorAll('.home-cardio-quick').forEach(b => b.classList.remove('selected'));
    });
    document.getElementById('btn-cardio-confirm').addEventListener('click', () => {
      const minutes = parseInt(homeInput.value) || 0;
      if (minutes <= 0) return;
      Storage.addCardioEntry(minutes, new Date().toISOString());
      if (navigator.vibrate) navigator.vibrate(50);
      this.renderCardioProgress();
    });
  },

  // ========== RENDER HISTORY EXPAND ==========

  renderHistoryExpand(history, isFlex) {
    const container = document.getElementById('history-expand');
    const sessions = isFlex ? FLEX_SESSIONS : TRAININGS;
    const last5 = history.slice(0, 5);

    if (last5.length === 0) {
      container.innerHTML = '<div class="history-expand-empty">Nenhum treino registrado ainda</div>';
      return;
    }

    container.innerHTML = last5.map((entry, idx) => {
      const tpl = sessions[entry.trainingIndex];
      const d = new Date(entry.date);
      const dateStr = d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit' });
      const totalSets = entry.exercises.reduce((a, ex) => a + ex.sets, 0);
      const doneSets = entry.exercises.reduce((a, ex) => a + ex.setsCompleted, 0);

      // Horários e duração
      const startTime = d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      let endTime = '';
      let durationStr = '';
      if (entry.endDate) {
        const ed = new Date(entry.endDate);
        endTime = ed.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        const diffMs = ed.getTime() - d.getTime();
        const diffMin = Math.round(diffMs / 60000);
        const h = Math.floor(diffMin / 60);
        const m = diffMin % 60;
        durationStr = h > 0 ? `${h}h${m > 0 ? m + 'min' : ''}` : `${m}min`;
      } else if (entry.duration) {
        const h = Math.floor(entry.duration / 60);
        const m = entry.duration % 60;
        durationStr = h > 0 ? `${h}h${m > 0 ? m + 'min' : ''}` : `${m}min`;
      } else {
        durationStr = '?';
      }

      const timeDetail = entry.endDate
        ? `<div class="history-expand-time">${startTime} &rarr; ${endTime} (${durationStr})</div>`
        : `<div class="history-expand-time">${durationStr}</div>`;

      const cardioLine = entry.cardioMinutes
        ? `<div class="history-expand-exercise history-expand-cardio">Cardio: ${entry.cardioMinutes}min</div>`
        : '';

      const exerciseDetail = entry.exercises.map(ex =>
        isFlex
          ? `<div class="history-expand-exercise">${ex.name} — <span>${ex.setsCompleted}/${ex.sets}</span></div>`
          : `<div class="history-expand-exercise">${ex.name} — <span>${ex.weight ? ex.weight + 'kg' : '-'}</span> — ${ex.setsCompleted}/${ex.sets}</div>`
      ).join('');

      return `
        <div class="history-expand-entry" data-hidx="${idx}">
          <div class="history-expand-entry-icon">${tpl ? tpl.icon : ICONS.clock}</div>
          <div class="history-expand-entry-info">
            <div class="history-expand-entry-name">${entry.name || (tpl ? tpl.name : '?')}</div>
            <div class="history-expand-entry-meta">
              <span>${dateStr}</span>
              <span class="dur">${durationStr}</span>
              <span class="sets">${doneSets}/${totalSets} sets</span>
            </div>
          </div>
          <button class="history-delete-btn" data-hidx="${idx}" title="Excluir treino">${ICONS.trash}</button>
        </div>
        <div class="history-expand-entry-detail" id="hexp-detail-${idx}">
          ${timeDetail}
          ${cardioLine}
          ${exerciseDetail}
        </div>`;
    }).join('');

    // Toggle detail on entry click
    container.querySelectorAll('.history-expand-entry').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target.closest('.history-delete-btn')) return;
        const idx = el.dataset.hidx;
        const detail = document.getElementById(`hexp-detail-${idx}`);
        detail.classList.toggle('open');
      });
    });

    // Delete history entry
    container.querySelectorAll('.history-delete-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.hidx);
        if (!confirm('Excluir este treino do historico?')) return;
        if (isFlex) Storage.removeFromFlexHistory(idx);
        else Storage.removeFromHistory(idx);
        this.updateHomeScreen();
      });
    });
  },

  // ========== START WORKOUT ==========

  startWorkout(type, index) {
    const tpl = type === 'flex' ? FLEX_SESSIONS[index] : TRAININGS[index];
    const weights = Storage.getWeights();

    this.currentWorkout = {
      type: type,
      trainingIndex: index,
      name: tpl.name,
      date: new Date().toISOString(),
      warmup: tpl.warmup.map(() => false),
      exercises: tpl.exercises.map(ex => ({
        name: ex.name,
        scheme: ex.scheme,
        technique: ex.technique || null,
        rest: ex.rest,
        sets: ex.sets,
        setLabels: ex.setLabels,
        block: ex.block || null,
        hold: ex.hold || null,
        perSide: ex.perSide || false,
        note: ex.note || null,
        weight: type === 'flex' ? '' : (weights[ex.name] || ''),
        setsCompleted: 0,
        completedSetIndices: []
      }))
    };

    Storage.saveInProgress(this.currentWorkout);
    this.renderWorkoutScreen();
    this.showScreen('workout');
  },

  // ========== RENDER WORKOUT ==========

  renderWorkoutScreen() {
    const w = this.currentWorkout;
    const isFlex = w.type === 'flex';
    const tpl = (isFlex ? FLEX_SESSIONS : TRAININGS)[w.trainingIndex];
    document.getElementById('workout-title').innerHTML = `${tpl.icon} ${w.name}`;

    // Cardio input: só nos treinos de academia
    document.getElementById('cardio-input-section').style.display = isFlex ? 'none' : '';
    document.getElementById('cardio-custom-input').value = '';
    document.querySelectorAll('.cardio-quick-btn').forEach(b => b.classList.remove('selected'));

    // Update rest timer button
    this.updateRestTimerButton();

    // Warmup - collapsed if done before
    const history = isFlex ? Storage.getFlexHistory() : Storage.getHistory();
    const hasDoneBefore = history.some(h => h.trainingIndex === w.trainingIndex);
    const warmupOpen = hasDoneBefore ? '' : ' open';
    const warmupContainer = document.getElementById('warmup-container');
    warmupContainer.innerHTML = `
      <div class="warmup-section">
        <div class="warmup-header${warmupOpen}" id="warmup-toggle">
          <span>${isFlex ? 'Aquecimento' : 'Aquecimento dinâmico'}</span>
          <span class="arrow">▼</span>
        </div>
        <div class="warmup-body${warmupOpen}" id="warmup-body">
          ${tpl.warmup.map((item, i) => {
            const seconds = this.parseWarmupDuration(item.duration);
            return `
            <div class="warmup-item">
              <div class="warmup-check ${w.warmup[i] ? 'done' : ''}" data-warmup="${i}"></div>
              <div class="warmup-item-text">${item.name} <span class="warmup-duration">${item.duration}</span></div>
              <button class="warmup-timer-btn" data-seconds="${seconds}" title="Timer ${seconds}s">${ICONS.clock}</button>
            </div>`;
          }).join('')}
        </div>
      </div>`;

    document.getElementById('warmup-toggle').addEventListener('click', () => {
      document.getElementById('warmup-toggle').classList.toggle('open');
      document.getElementById('warmup-body').classList.toggle('open');
    });
    warmupContainer.querySelectorAll('.warmup-check').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.warmup);
        btn.classList.toggle('done');
        this.currentWorkout.warmup[idx] = btn.classList.contains('done');
        this.persistWorkout();
      });
    });
    warmupContainer.querySelectorAll('.warmup-timer-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const seconds = parseInt(btn.dataset.seconds);
        this.startTimer(seconds);
      });
    });

    // Exercises (flex: com headers de seção Bloco comum / Foco)
    const container = document.getElementById('exercises-container');
    let exercisesHtml = '';
    let lastBlock = null;
    w.exercises.forEach((ex, i) => {
      if (isFlex && ex.block && ex.block !== lastBlock) {
        exercisesHtml += `<div class="block-header">${ex.block === 'comum' ? 'Bloco comum' : 'Foco do dia'}</div>`;
        lastBlock = ex.block;
      }
      exercisesHtml += this.renderExerciseCard(ex, i, isFlex);
    });
    container.innerHTML = exercisesHtml;

    // Event listeners for exercises
    container.querySelectorAll('.set-btn').forEach(btn => {
      btn.addEventListener('click', () => this.toggleSet(btn));
    });
    container.querySelectorAll('.weight-input').forEach(input => {
      input.addEventListener('change', () => {
        const idx = parseInt(input.dataset.exercise);
        const val = parseFloat(input.value) || '';
        this.currentWorkout.exercises[idx].weight = val;
        if (val) Storage.saveWeight(this.currentWorkout.exercises[idx].name, val);
        this.persistWorkout();
      });
    });
    container.querySelectorAll('.hold-timer-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        this.startTimer(parseInt(btn.dataset.seconds));
      });
    });
  },

  parseWarmupDuration(duration) {
    // Parse "3x30s" -> 30, "2x20s" -> 20
    const match = duration.match(/(\d+)s/);
    return match ? parseInt(match[1]) : 30;
  },

  parseSetLabel(label) {
    const match = label.match(/^(\d+[-\d]*)\+(\d+s)\+?(\d+)?$/);
    if (match) {
      return {
        reps: match[1],
        pause: match[2],
        bonus: match[3] ? `+${match[3]}` : null
      };
    }
    return { reps: label.replace(/r$/, ''), pause: null, bonus: null };
  },

  renderExerciseCard(ex, idx, isFlex) {
    let techBadge = '';
    if (ex.technique === 'Rest Pause') {
      techBadge = '<span class="technique-badge rest-pause">Rest Pause</span>';
    } else if (ex.technique === 'Isometria') {
      techBadge = '<span class="technique-badge isometria">Isometria</span>';
    } else if (ex.technique === 'Pico de contração') {
      techBadge = '<span class="technique-badge pico">Pico de contração 2s</span>';
    }

    const noteHtml = ex.note ? `<div class="exercise-note">${ex.note}</div>` : '';

    const setButtons = ex.setLabels.map((label, si) => {
      const completed = ex.completedSetIndices.includes(si) ? ' completed' : '';
      const parsed = this.parseSetLabel(label);
      const isVariant = (parsed.pause || parsed.bonus) ? ' set-variant' : '';
      let inner = `<span class="set-reps">${parsed.reps}</span>`;
      if (parsed.pause) inner += `<span class="set-pause">${parsed.pause}</span>`;
      if (parsed.bonus) inner += `<span class="set-bonus">${parsed.bonus}</span>`;
      if (ex.perSide) inner += `<span class="set-pause">${si % 2 === 0 ? 'esq' : 'dir'}</span>`;
      return `<button class="set-btn${completed}${isVariant}" data-exercise="${idx}" data-set="${si}">${inner}</button>`;
    }).join('');

    if (isFlex) {
      // Flex: sem peso/PR; hold-timer no lugar do descanso
      const holdBtn = ex.hold ? `<button class="hold-timer-btn" data-seconds="${ex.hold}">${ICONS.clock} ${ex.hold}s</button>` : '';
      return `
        <div class="exercise-card">
          <div class="exercise-header">
            <span class="exercise-name">${ex.name}</span>
            ${holdBtn}
          </div>
          ${noteHtml}
          <div class="sets-row">
            ${setButtons}
          </div>
          <div class="exercise-footer">
            <span class="rest-info">${ex.scheme}</span>
            <span class="sets-count" id="sets-count-${idx}">${ex.setsCompleted}/${ex.sets} sets</span>
          </div>
        </div>`;
    }

    const pr = Storage.getPR(ex.name);
    const prHtml = pr ? `<span class="exercise-pr"><span class="pr-mark">&#9670;</span> PR: ${pr}kg</span>` : '<span class="exercise-pr"></span>';
    const isPR = pr && ex.weight && parseFloat(ex.weight) >= pr;

    return `
      <div class="exercise-card${isPR ? ' pr-matched' : ''}">
        <div class="exercise-header">
          <span class="exercise-name">${ex.name}</span>
          ${techBadge}
        </div>
        ${noteHtml}
        <div class="exercise-weight-row">
          ${prHtml}
          <div class="exercise-weight-input-group">
            <input type="number" class="weight-input" data-exercise="${idx}" step="0.5" placeholder="—" value="${ex.weight || ''}">
            <span class="weight-label">kg</span>
          </div>
        </div>
        <div class="sets-row">
          ${setButtons}
        </div>
        <div class="exercise-footer">
          <span class="rest-info">${ICONS.clock} ${ex.rest}</span>
          <span class="sets-count" id="sets-count-${idx}">${ex.setsCompleted}/${ex.sets} sets</span>
        </div>
      </div>`;
  },

  // ========== SET TOGGLE ==========

  toggleSet(btn) {
    const exIdx = parseInt(btn.dataset.exercise);
    const setIdx = parseInt(btn.dataset.set);
    const wasCompleted = btn.classList.contains('completed');
    btn.classList.toggle('completed');

    const completed = document.querySelectorAll(`.set-btn[data-exercise="${exIdx}"].completed`);
    const indices = Array.from(completed).map(b => parseInt(b.dataset.set));
    this.currentWorkout.exercises[exIdx].setsCompleted = indices.length;
    this.currentWorkout.exercises[exIdx].completedSetIndices = indices;
    document.getElementById(`sets-count-${exIdx}`).textContent = `${indices.length}/${this.currentWorkout.exercises[exIdx].sets} sets`;
    this.persistWorkout();
    if (!wasCompleted && navigator.vibrate) navigator.vibrate(50);

    // Auto-start rest timer on set completion (not on unmark; flex tem rest null)
    if (!wasCompleted && indices.length < this.currentWorkout.exercises[exIdx].sets) {
      const restStr = this.currentWorkout.exercises[exIdx].rest;
      if (restStr) this.startTimer(this.parseRestToSeconds(restStr));
    }
  },

  parseRestToSeconds(restStr) {
    const parts = restStr.split(':');
    return parseInt(parts[0]) * 60 + parseInt(parts[1] || 0);
  },

  updateRestTimerButton() {
    const btn = document.getElementById('btn-rest-timer');
    btn.textContent = 'DESCANSO';
  },

  startTimerFromButton() {
    this.startTimer(90);
  },

  // ========== TIMER ==========

  startTimer(totalSeconds) {
    this.stopTimer();
    this.timerTotalSeconds = totalSeconds;
    this.timerSeconds = totalSeconds;
    this.updateTimerDisplay();
    const display = document.getElementById('timer-display');
    display.classList.add('active');
    display.classList.remove('finished');
    const circle = document.getElementById('timer-circle');
    circle.classList.remove('warning');
    circle.style.setProperty('--progress', 1);
    this.timerInterval = setInterval(() => {
      this.timerSeconds--;
      this.updateTimerDisplay();
      if (this.timerSeconds <= 0) this.timerFinished();
    }, 1000);
  },

  updateTimerDisplay() {
    const m = Math.floor(this.timerSeconds / 60);
    const s = this.timerSeconds % 60;
    document.getElementById('timer-value').textContent = `${m}:${s.toString().padStart(2, '0')}`;
    const circle = document.getElementById('timer-circle');
    if (this.timerTotalSeconds > 0) {
      const p = this.timerSeconds / this.timerTotalSeconds;
      circle.style.setProperty('--progress', p);
      circle.classList.toggle('warning', this.timerSeconds <= 10 && this.timerSeconds > 0);
    }
  },

  stopTimer() {
    if (this.timerInterval) { clearInterval(this.timerInterval); this.timerInterval = null; }
    const display = document.getElementById('timer-display');
    display.classList.remove('active', 'finished');
    const circle = document.getElementById('timer-circle');
    circle.style.setProperty('--progress', 1);
    circle.classList.remove('warning');
  },

  timerFinished() {
    if (this.timerInterval) { clearInterval(this.timerInterval); this.timerInterval = null; }
    if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
    const display = document.getElementById('timer-display');
    const circle = document.getElementById('timer-circle');
    circle.style.setProperty('--progress', 0);
    circle.classList.remove('warning');
    display.classList.add('finished');
    document.getElementById('timer-value').textContent = 'GO!';
  },

  // ========== PERSIST / RESTORE ==========

  persistWorkout() {
    Storage.saveInProgress(this.currentWorkout);
  },

  restoreWorkoutState() {
    // Re-render handles state via currentWorkout data
  },

  // ========== FINISH / CANCEL ==========

  showCelebration() {
    const overlay = document.createElement('div');
    overlay.className = 'celebration-overlay';
    overlay.innerHTML = '<div class="celebration-text">Arrasou, Quésia</div>';
    document.body.appendChild(overlay);

    // Partículas: losangos dourados + pontos roxos caindo
    for (let i = 0; i < 28; i++) {
      const p = document.createElement('span');
      p.className = 'celebration-particle ' + (i % 3 === 0 ? 'dot' : 'diamond');
      const size = 4 + Math.random() * 5;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = (Math.random() * 94 + 3) + '%';
      p.style.animationDuration = (1.8 + Math.random() * 1.5) + 's';
      p.style.animationDelay = (Math.random() * 1.2) + 's';
      document.body.appendChild(p);
    }

    setTimeout(() => {
      overlay.remove();
      document.querySelectorAll('.celebration-particle').forEach(s => s.remove());
    }, 3500);
  },

  finishWorkout() {
    if (!this.currentWorkout) return;
    const totalSets = this.currentWorkout.exercises.reduce((a, e) => a + e.sets, 0);
    const doneSets = this.currentWorkout.exercises.reduce((a, e) => a + e.setsCompleted, 0);

    if (doneSets < totalSets) {
      if (!confirm(`Voce completou ${doneSets}/${totalSets} sets. Finalizar mesmo assim?`)) return;
    }

    const isFlex = this.currentWorkout.type === 'flex';
    const start = new Date(this.currentWorkout.date);
    const endDate = new Date().toISOString();
    const duration = Math.round((Date.now() - start.getTime()) / 60000);

    // Cardio (só academia)
    const cardioInput = document.getElementById('cardio-custom-input');
    const cardioMinutes = isFlex ? 0 : (parseInt(cardioInput.value) || 0);

    const record = {
      type: this.currentWorkout.type,
      trainingIndex: this.currentWorkout.trainingIndex,
      name: this.currentWorkout.name,
      date: this.currentWorkout.date,
      endDate: endDate,
      duration: duration,
      cardioMinutes: cardioMinutes,
      exercises: this.currentWorkout.exercises.map(ex => ({
        name: ex.name,
        weight: ex.weight,
        setsCompleted: ex.setsCompleted,
        sets: ex.sets,
        scheme: ex.scheme
      }))
    };

    const config = Storage.getConfig();
    if (isFlex) {
      Storage.addToFlexHistory(record);
      config.flexCompleted++;
    } else {
      Storage.addToHistory(record);
      if (cardioMinutes > 0) Storage.addCardioEntry(cardioMinutes, record.date);
      record.exercises.forEach(ex => {
        Storage.addWeightEntry(ex.name, ex.weight, record.date);
      });
      config.totalCompleted++;
    }
    Storage.saveConfig(config);
    this.showCelebration();

    this.stopTimer();
    Storage.clearInProgress();
    this.currentWorkout = null;
    this.showScreen('home');
    this.updateHomeScreen();
  },

  cancelWorkout() {
    if (!confirm('Cancelar treino? O progresso sera perdido.')) return;
    this.stopTimer();
    Storage.clearInProgress();
    this.currentWorkout = null;
    this.showScreen('home');
    this.updateHomeScreen();
  }
};

// ========== INIT ==========
document.addEventListener('DOMContentLoaded', () => App.init());
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
